<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foco Crema de Leche · Canal TR</title>
<style>
:root{
  --p:#082B73; --p2:#0d3a99; --p3:#1a52c4;
  --gold:#D4AF37; --gold2:#f0cc44;
  --card:#FFFFFF; --bg:#eef2fc;
  --ink:#1e293b; --ink2:#64748b; --line:#dde3f0;
  --car:var(--p2); --car-d:var(--p); --car-bg:#e6ecfb;
  --good:#16a34a; --good-bg:#dcfce7;
  --warn:#d97706; --warn-bg:#fef3c7;
  --bad:#dc2626; --bad-bg:#fee2e2;
  --gold-bg:#fdf6df;
  --shadow:0 1px 3px rgba(8,43,115,.08),0 4px 16px rgba(8,43,115,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.hidden{display:none!important}

/* ═══ LOGIN ═══ */
#LS{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(155deg,#061e52 0%,var(--p) 45%,var(--p3) 100%);position:relative;overflow:hidden;padding:20px}
#LS::before{content:'';position:absolute;width:700px;height:700px;border-radius:50%;
  background:rgba(255,255,255,.03);top:-220px;left:-160px;pointer-events:none}
#LS::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;
  background:rgba(212,175,55,.08);bottom:-150px;right:-100px;pointer-events:none}
.lc{background:var(--card);border-radius:20px;box-shadow:0 24px 80px rgba(0,0,0,.28);
  width:380px;max-width:100%;padding:44px 36px;position:relative;z-index:1}
.lt{text-align:center;margin-bottom:26px}
.ldrop{font-size:48px;display:block;margin-bottom:6px}
.ltitle{font-size:22px;font-weight:800;color:var(--p);letter-spacing:.3px}
.ltitle2{font-size:12px;font-weight:700;color:var(--gold2);letter-spacing:1.5px;margin-top:2px;text-transform:uppercase;background:var(--p);display:inline-block;padding:2px 10px;border-radius:20px}
.lsub{font-size:12.5px;color:var(--ink2);margin-top:12px}
.lf label{font-size:12px;font-weight:700;color:var(--ink2);display:block;margin:14px 0 5px}
.lf input{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14.5px;background:var(--bg)}
.lf input:focus{outline:none;border-color:var(--p2)}
.lbtn{width:100%;margin-top:20px;padding:12px;border:none;border-radius:10px;background:var(--p2);
  color:#fff;font-weight:700;font-size:15px;cursor:pointer;letter-spacing:.3px}
.lbtn:hover{background:var(--p)}
.lerr{display:none;margin-top:12px;background:var(--bad-bg);color:var(--bad);padding:9px 12px;
  border-radius:8px;font-size:12.5px;text-align:center;font-weight:600}

/* ═══ HEADER / NAV ═══ */
header{background:var(--card);border-bottom:1px solid var(--line);padding:12px 20px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.hbrand{display:flex;align-items:center;gap:10px}
.hbrand .drop{font-size:26px}
.htitle{font-size:16px;font-weight:800;color:var(--p)}
.hsub{font-size:10.5px;color:var(--ink2);letter-spacing:1px;font-weight:700}
.hright{display:flex;align-items:center;gap:10px}
.ubadge{background:var(--car-bg);border-radius:20px;padding:6px 14px;font-size:12.5px;font-weight:700;color:var(--p);display:flex;gap:6px;align-items:center}
.urole{background:var(--p2);color:#fff;font-size:9.5px;padding:2px 7px;border-radius:10px;font-weight:700}
.iconbtn{background:var(--bg);border:1px solid var(--line);width:34px;height:34px;border-radius:50%;
  cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.iconbtn:hover{background:var(--car-bg)}
.lout{background:var(--p);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:12.5px;font-weight:700;cursor:pointer}

.tnav{display:flex;gap:6px;background:var(--card);padding:0 16px;border-bottom:1px solid var(--line);overflow-x:auto}
.tbtn{background:none;border:none;padding:13px 16px;font-size:13.5px;font-weight:700;color:var(--ink2);
  cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.tbtn.on{color:var(--p);border-bottom-color:var(--p2)}

.mc{max-width:920px;margin:0 auto;padding:20px 16px 60px}
.crumbs{display:flex;gap:6px;align-items:center;font-size:12.5px;color:var(--ink2);margin-bottom:14px;flex-wrap:wrap}
.crumbs span.cl{color:var(--car-d);cursor:pointer;font-weight:700}
.banner{background:var(--warn-bg);color:var(--warn);padding:10px 14px;border-radius:10px;font-size:12.5px;
  font-weight:600;margin-bottom:14px}

/* ═══ CARDS ═══ */
.gg{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:16px}
.card{background:var(--card);border-radius:16px;padding:18px;box-shadow:var(--shadow);border:1px solid var(--line);cursor:pointer;transition:.15s}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(8,43,115,.14)}
.card.nolink{cursor:default}
.card.nolink:hover{transform:none;box-shadow:var(--shadow)}
.cardhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cardname{font-size:15.5px;font-weight:800;color:var(--ink)}
.cardtag{font-size:10px;color:var(--ink2);font-weight:700;letter-spacing:.5px}
.pill{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:20px}
.pill.gold{background:var(--gold-bg);color:var(--gold)}
.pill.green{background:var(--good-bg);color:var(--good)}
.pill.yellow{background:var(--warn-bg);color:var(--warn)}
.pill.red{background:var(--bad-bg);color:var(--bad)}

.metrow{margin-bottom:12px}
.metrow:last-child{margin-bottom:0}
.metlbl{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:5px}
.metlbl b{color:var(--ink);font-weight:800}
.bar{height:9px;background:var(--bg);border-radius:6px;overflow:hidden;position:relative}
.bar>i{display:block;height:100%;border-radius:6px}
.bar>i.gold{background:linear-gradient(90deg,var(--gold2),var(--gold))}
.bar>i.green{background:var(--good)}
.bar>i.yellow{background:var(--warn)}
.bar>i.red{background:var(--bad)}
.pace{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink)}

.winner{margin-top:12px;background:var(--gold-bg);color:var(--gold);border-radius:10px;padding:8px 10px;
  font-size:12px;font-weight:800;text-align:center}

/* ═══ KPI GRID ═══ */
.kgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.kc{background:var(--card);border-radius:14px;padding:16px;box-shadow:var(--shadow);border:1px solid var(--line);text-align:center}
.kn{font-size:22px;font-weight:900;color:var(--p)}
.kl{font-size:11px;font-weight:800;color:var(--ink2);text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
.ks{font-size:10.5px;color:var(--ink2);margin-top:2px}

/* ═══ QUOTE BANNER ═══ */
.quoteband{background:linear-gradient(120deg,var(--p) 0%,var(--p3) 100%);border-radius:14px;
  padding:18px 22px;display:flex;align-items:center;gap:14px;margin-bottom:16px;color:#fff}
.quoteicon{font-size:22px;flex:none}
.quotetext{font-size:14px;font-weight:700;font-style:italic;line-height:1.4}
.quotesub{font-size:10px;color:#b9c7ea;letter-spacing:1px;font-weight:700;margin-top:4px}

/* ═══ GROUP / ROUTE SUMMARY CARDS (meta vs actual) ═══ */
.gcardhead{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.gicon{font-size:15px}
.gname{font-size:16px;font-weight:800;color:var(--p)}
.gbadge{background:var(--car-bg);color:var(--p2);font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:6px}
.gcardsub{font-size:11px;color:var(--ink2);margin:2px 0 12px;font-weight:600}
.statrow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.statbox{background:var(--bg);border-radius:10px;padding:10px 12px}
.statn{font-size:18px;font-weight:800;color:var(--ink)}
.statl{font-size:9.5px;font-weight:800;color:var(--ink2);letter-spacing:.4px;margin-top:2px}
.genlbl{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--ink2);margin:10px 0 5px}
.genlbl b{font-size:13px}
.gcardfoot{display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;font-size:10.5px;color:var(--ink2);margin-top:10px;font-weight:600}

/* ═══ GOAL CARDS (vista de vendedor) ═══ */
.goalgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.goalcard{background:var(--card);border-radius:16px;padding:20px;box-shadow:var(--shadow);border:1px solid var(--line);
  border-top:4px solid var(--p2)}
.goalcard.u{border-top-color:var(--gold)}
.goalicon{font-size:24px;margin-bottom:4px}
.goaltitle{font-size:12px;font-weight:800;color:var(--ink2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px}
.goalnum{font-size:30px;font-weight:900;color:var(--ink);line-height:1}
.goalnum span{font-size:15px;font-weight:700;color:var(--ink2)}
.goalpct{font-size:13px;font-weight:800;margin-top:4px}
.goalbar{height:10px;background:var(--bg);border-radius:6px;overflow:hidden;margin-top:12px;position:relative}
.goalbar>i{display:block;height:100%;border-radius:6px}
.goalbar>i.gold{background:linear-gradient(90deg,var(--gold2),var(--gold))}
.goalbar>i.green{background:var(--good)}
.goalbar>i.yellow{background:var(--warn)}
.goalbar>i.red{background:var(--bad)}

/* ═══ TABLE ═══ */
.rktbl{width:100%;border-collapse:collapse;background:var(--card);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.rktbl th{background:var(--bg);font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink2);
  padding:10px 8px;text-align:left}
.rktbl td{padding:10px 8px;font-size:12.5px;border-top:1px solid var(--line)}
.rktbl tr.me{background:var(--car-bg)}
.rktbl tr.sep td{background:var(--bg);font-weight:800;font-size:11px;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;padding:7px 8px}
.rkpos{font-weight:800;color:var(--ink2)}
.badge{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:20px}

/* ═══ RULES ═══ */
.rulecard{background:var(--card);border-radius:16px;padding:20px;box-shadow:var(--shadow);margin-bottom:14px;border:1px solid var(--line)}
.rulecard h3{font-size:15px;color:var(--car-d);margin-bottom:10px}
.rulelist{list-style:none}
.rulelist li{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.rulelist li:last-child{border-bottom:none}
.rulelist .num{width:24px;height:24px;background:var(--car);color:#fff;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:11.5px;font-weight:800;flex:none}
.prizebox{background:linear-gradient(135deg,#fdf6df,#eef2fc);border-radius:14px;padding:22px;text-align:center;margin-top:6px;border:1px solid var(--line)}
.prizebox .amt{font-size:30px;font-weight:900;color:var(--gold)}
.prizebox .lbl{font-size:12px;color:var(--ink2);font-weight:700;margin-top:4px}
.pending{font-size:12px;color:var(--warn);background:var(--warn-bg);padding:10px 12px;border-radius:10px;margin-top:10px}

/* ═══ ADMIN ═══ */
.adminbox{background:var(--card);border-radius:14px;padding:18px;margin-bottom:14px;border:1px solid var(--line)}
.adminbox h4{font-size:13.5px;color:var(--car-d);margin-bottom:12px}
.arow{display:flex;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
.arow:last-child{border-bottom:none}
.arow .who{width:110px;font-size:12px;font-weight:700}
.arow select,.arow input{padding:7px 8px;border:1px solid var(--line);border-radius:8px;font-size:12px}
.abtn{background:var(--car);color:#fff;border:none;padding:9px 16px;border-radius:8px;font-size:12.5px;font-weight:700;cursor:pointer;margin-right:8px;margin-top:6px}
.abtn.sec{background:var(--ink)}
.abtn.ok{background:var(--good)}

@media(max-width:900px){.kgrid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:640px){
  .mc{padding:14px 10px}
  .gg,.goalgrid,.statrow{grid-template-columns:1fr}
  .kgrid{grid-template-columns:repeat(2,1fr)}
  .lc{padding:30px 22px}
  .arow .who{width:90px}
  .hsub{display:none}
  .quoteband{flex-direction:column;text-align:center}
}

/* ═══ CAMPAIGN SELECTOR ═══ */
#SEL{min-height:100vh;background:var(--bg)}
.selhead{background:linear-gradient(155deg,#061e52 0%,var(--p) 45%,var(--p3) 100%);padding:30px 20px 60px;text-align:center;color:#fff}
.selhead .st1{font-size:20px;font-weight:800}
.selhead .st2{font-size:12.5px;color:#c7d3f2;margin-top:4px}
.selwrap{max-width:820px;margin:-38px auto 0;padding:0 16px 50px}
.selgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.selcard{background:var(--card);border-radius:18px;padding:24px;box-shadow:0 10px 30px rgba(8,43,115,.16);
  cursor:pointer;transition:.15s;text-align:center;border:1px solid var(--line)}
.selcard:hover{transform:translateY(-3px)}
.selicon{font-size:38px;margin-bottom:8px}
.selname{font-size:16px;font-weight:800;color:var(--p)}
.seltag{font-size:11.5px;color:var(--ink2);margin-top:4px}
.selgo{margin-top:14px;background:var(--p2);color:#fff;border:none;padding:8px 20px;border-radius:20px;font-size:12.5px;font-weight:700}
.selback{background:none;border:none;color:var(--ink2);font-size:12.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="LS">
  <div class="lc">
    <div class="lt">
      <span class="ldrop">🏆</span>
      <div class="ltitle">Retos Normandy</div>
      <div class="ltitle2">Canal TR</div>
      <div class="lsub">Ingresa con tu usuario de ruta para ver tus campañas activas</div>
    </div>
    <div class="lf">
      <label>Usuario</label>
      <input type="text" id="lu" placeholder="Ej: A_CEC" autocomplete="username">
      <label>Contraseña</label>
      <input type="password" id="lp" placeholder="••••••" autocomplete="current-password">
      <button class="lbtn" onclick="doLogin()">Ingresar</button>
      <div class="lerr" id="lerr">Usuario o contraseña incorrectos</div>
    </div>
  </div>
</div>

<!-- ═══ SELECTOR DE CAMPAÑA ═══ -->
<div id="SEL" class="hidden">
  <div class="selhead">
    <div class="st1">👋 Hola, <span id="selUser">-</span></div>
    <div class="st2">Elige la campaña que quieres ver</div>
  </div>
  <div class="selwrap">
    <div class="selgrid" id="selGrid"></div>
    <div style="text-align:center;margin-top:24px">
      <button class="lout" onclick="doLogout()" style="background:var(--ink)">Salir</button>
    </div>
  </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div id="DB" class="hidden">
  <header>
    <div class="hbrand">
      <span class="drop" id="hicon">🥛</span>
      <div>
        <div class="htitle" id="htitle">-</div>
        <div class="hsub" id="hsubtitle">-</div>
      </div>
    </div>
    <div class="hright">
      <div class="ubadge"><span id="huser">-</span><span class="urole" id="hrole">-</span></div>
      <button class="iconbtn hidden" id="adminBtn" onclick="toggleAdmin()" title="Admin">⚙️</button>
      <button class="iconbtn" onclick="backToSelector()" title="Cambiar campaña">🔀</button>
      <button class="lout" onclick="doLogout()">Salir</button>
    </div>
  </header>
  <nav class="tnav">
    <button class="tbtn on" id="tbs" onclick="switchTab('s')">📊 Resumen</button>
    <button class="tbtn" id="tbr" onclick="switchTab('r')">🏅 Ranking</button>
    <button class="tbtn" id="tbg" onclick="switchTab('g')">🎯 Reglas de Juego</button>
  </nav>
  <div class="mc">
    <div id="banner"></div>
    <div id="TS"></div>
    <div id="TR" class="hidden"></div>
    <div id="TG" class="hidden"></div>
    <div id="TA" class="hidden"></div>
  </div>
</div>

<script>
/* ─────────── CONFIG GENERAL ─────────── */
const GROUP_INFO = {
  A_TAT: { label:'A_TAT · Autoventa', badge:'AV', zone:'Zona TAT', workdays:[1,2,3,4,5]   },
  P_PER: { label:'P_PER · Preventa',  badge:'PV', zone:'Pereira',  workdays:[1,2,3,4,5,6] },
  P_MZL: { label:'P_MZL · Preventa',  badge:'PV', zone:'Manizales',workdays:[1,2,3,4,5,6] }
};
const GROUPS = ['A_TAT','P_PER','P_MZL'];
const QUOTE = { text:'"La meta no se cumple sola — se construye cliente a cliente, visita a visita."', sub:'NORMANDY TRADE · CANAL TR' };

/* ─────────── CAMPAÑAS ───────────
   Para agregar una campaña nueva (ej. en agosto), copia un bloque y cambia
   id, name, icon, producto y csvUrl. El resto de la app la detecta sola. */
const CAMPAIGNS=[
  { id:'crema', name:'Foco Crema de Leche', icon:'🥛', producto:'Crema de Leche',
    csvUrl:'https://docs.google.com/spreadsheets/d/e/2PACX-1vS5dDBsTv_H62qye11Qp2MiZakW6kAQxRB3zUijxx_wQVw3mrFTim_PTdzjQDu0zScmjRsVBydkXSfa/pub?gid=0&single=true&output=csv',
    start:'2026-07-21', end:'2026-08-01', premio:100000, activo:true, uniformDays:true },
  { id:'yomax', name:' Reto Yomax Normandy', icon:'🧃', producto:'Yomax',
    csvUrl:'https://docs.google.com/spreadsheets/d/e/2PACX-1vReHewBVkMXx_oYOh7WM_BYeG6iSjzyG5mkw-ee18pVbywTIeQliO-coxds2DzXJJBOsRP77nSHsMOz/pub?gid=0&single=true&output=csv',
    start:'2026-07-21', end:'2026-08-01', premio:100000, activo:true, uniformDays:true }
];

/* ─────────── USERS (contraseñas por defecto: usuario + "2026") ─────────── */
const USERS=[
  {rol:'Admin', u:'Mercadeo', p:'Mercadeo2026', g:null},
  {rol:'Coord', u:'A_TAT', p:'A_TAT2026', g:'A_TAT'},
  {rol:'Coord', u:'P_PER', p:'P_PER2026', g:'P_PER'},
  {rol:'Coord', u:'P_MZL', p:'P_MZL2026', g:'P_MZL'},
  {rol:'Vend', u:'A_CEC',  p:'A_CEC2026',  g:'A_TAT'},
  {rol:'Vend', u:'A_MGM',  p:'A_MGM2026',  g:'A_TAT'},
  {rol:'Vend', u:'A_NOC',  p:'A_NOC2026',  g:'A_TAT'},
  {rol:'Vend', u:'A_NOT',  p:'A_NOT2026',  g:'A_TAT'},
  {rol:'Vend', u:'A_NOV',  p:'A_NOV2026',  g:'A_TAT'},
  {rol:'Vend', u:'A_OCC1', p:'A_OCC12026', g:'A_TAT'},
  {rol:'Vend', u:'A_OCC2', p:'A_OCC22026', g:'A_TAT'},
  {rol:'Vend', u:'A_ORC',  p:'A_ORC2026',  g:'A_TAT'},
  {rol:'Vend', u:'A_QUI',  p:'A_QUI2026',  g:'A_TAT'},
  {rol:'Vend', u:'A_RIS',  p:'A_RIS2026',  g:'A_TAT'},
  {rol:'Vend', u:'A_SOA',  p:'A_SOA2026',  g:'A_TAT'},
  {rol:'Vend', u:'P_PER1', p:'P_PER12026', g:'P_PER'},
  {rol:'Vend', u:'P_PER2', p:'P_PER22026', g:'P_PER'},
  {rol:'Vend', u:'P_PER3', p:'P_PER32026', g:'P_PER'},
  {rol:'Vend', u:'P_PER4', p:'P_PER42026', g:'P_PER'},
  {rol:'Vend', u:'P_PER5', p:'P_PER52026', g:'P_PER'},
  {rol:'Vend', u:'P_PER6', p:'P_PER62026', g:'P_PER'},
  {rol:'Vend', u:'P_QUI1', p:'P_QUI12026', g:'P_PER'},
  {rol:'Vend', u:'P_MZL1', p:'P_MZL12026', g:'P_MZL'},
  {rol:'Vend', u:'P_MZL2', p:'P_MZL22026', g:'P_MZL'},
  {rol:'Vend', u:'P_MZL3', p:'P_MZL32026', g:'P_MZL'},
  {rol:'Vend', u:'P_MZL4', p:'P_MZL42026', g:'P_MZL'},
  {rol:'Vend', u:'P_MZL5', p:'P_MZL52026', g:'P_MZL'},
  {rol:'Vend', u:'P_MZL6', p:'P_MZL62026', g:'P_MZL'},
  {rol:'Vend', u:'P_CAR1', p:'P_CAR12026', g:'P_PER'}
];

/* Condiciones adicionales por ruta y por campaña (presupuesto lácteos y averías).
   Valores posibles: null (pendiente), true (cumple), false (no cumple) */
const EXTRA=Object.fromEntries(CAMPAIGNS.map(c=>[c.id, Object.fromEntries(USERS.filter(x=>x.rol==='Vend').map(x=>[x.u,{presupuesto:null}]))]));
function getExtra(campId, ruta){
  if(!EXTRA[campId]) EXTRA[campId]={};
  if(!EXTRA[campId][ruta]) EXTRA[campId][ruta]={presupuesto:null};
  return EXTRA[campId][ruta];
}

/* ─────────── FECHAS / DÍAS HÁBILES ─────────── */
function parseD(s){ return new Date(s+'T00:00:00'); }
function calcWorkdayProgress(grupo){
  const c=curCampaign();
  const start=parseD(c.start), end=parseD(c.end);
  const today=new Date(); today.setHours(0,0,0,0);
  const wd = c.uniformDays ? [1,2,3,4,5,6] : GROUP_INFO[grupo].workdays;
  let total=0, elapsed=0, d=new Date(start);
  while(d<=end){
    if(wd.includes(d.getDay())){
      total++;
      if(d<today) elapsed++;
    }
    d.setDate(d.getDate()+1);
  }
  if(today<start) elapsed=0;
  if(today>end) elapsed=total;
  return { total, elapsed, pct: total? (elapsed/total*100):0 };
}
function semColor(pct, pace){
  if(pct>=100) return 'gold';
  if(pct>=pace) return 'green';
  if(pct>=pace-5) return 'yellow';
  return 'red';
}

/* ─────────── DATOS (CSV en vivo o demo) ─────────── */
function seedRand(str){
  let h=0; for(let i=0;i<str.length;i++) h=(h*31+str.charCodeAt(i))|0;
  return function(){ h=(h*1103515245+12345)&0x7fffffff; return (h%1000)/1000; };
}
function genDemoData(campId){
  const out={};
  USERS.filter(x=>x.rol==='Vend').forEach(x=>{
    const r=seedRand(campId+'_'+x.u);
    const metaClientes = 12+Math.floor(r()*14);
    const metaUnidades = 250+Math.floor(r()*450);
    const f1=r()*1.25, f2=r()*1.25;
    out[x.u]={
      grupo:x.g, ruta:x.u,
      metaClientes, metaUnidades,
      clientesNuevos: Math.min(metaClientes+3, Math.round(metaClientes*f1)),
      unidadesVendidas: Math.min(metaUnidades+60, Math.round(metaUnidades*f2))
    };
  });
  return out;
}
function parseCSV(text){
  const lines=text.trim().split('\n').map(l=>l.split(',').map(c=>c.trim().replace(/^"|"$/g,'')));
  const head=lines[0].map(h=>h.toLowerCase());
  const idx=k=>head.findIndex(h=>h.includes(k));
  const iG=idx('grupo'), iR=head.findIndex(h=>h.includes('ruta')||h.includes('vendedor'));
  const iMCf=head.findIndex(h=>h.includes('meta')&&h.includes('client'));
  const iMUf=head.findIndex(h=>h.includes('meta')&&h.includes('unidad'));
  const iCNf=head.findIndex(h=>(h.includes('cliente')&&!h.includes('meta')));
  const iUVf=head.findIndex(h=>(h.includes('unidad')&&!h.includes('meta')));
  const out={};
  for(let i=1;i<lines.length;i++){
    const row=lines[i]; if(row.length<2||!row[iR]) continue;
    const ruta=row[iR].trim();
    out[ruta]={
      grupo:(row[iG]||'').trim(),
      ruta,
      metaClientes: parseFloat(row[iMCf])||0,
      metaUnidades: parseFloat(row[iMUf])||0,
      clientesNuevos: parseFloat(row[iCNf])||0,
      unidadesVendidas: parseFloat(row[iUVf])||0
    };
  }
  return out;
}
async function loadCampaignData(campId){
  const c=CAMPAIGNS.find(x=>x.id===campId);
  const banner=document.getElementById('banner');
  banner.innerHTML='';
  if(c.csvUrl){
    try{
      const res=await fetch(c.csvUrl+(c.csvUrl.includes('?')?'&':'?')+'t='+Date.now());
      const text=await res.text();
      D[campId]=parseCSV(text);
    }catch(e){
      D[campId]=genDemoData(campId);
      banner.innerHTML='<div class="banner">⚠️ No se pudo conectar al Google Sheets de '+c.name+'. Mostrando datos de ejemplo.</div>';
    }
  } else {
    D[campId]=genDemoData(campId);
    banner.innerHTML='<div class="banner">🧪 Aún no se ha configurado el link del Google Sheets de '+c.name+' — mostrando datos de ejemplo para previsualización.</div>';
  }
  render();
}

/* ─────────── HELPERS DE CÁLCULO ─────────── */
function rutaMetrics(ruta){
  const d=D[cur] ? D[cur][ruta] : null; if(!d) return null;
  const pctC = d.metaClientes ? (d.clientesNuevos/d.metaClientes*100) : 0;
  const pctU = d.metaUnidades ? (d.unidadesVendidas/d.metaUnidades*100) : 0;
  const cumpleAmbas = pctC>=100 && pctU>=100;
  const ex=getExtra(cur, ruta);
  const ganador = cumpleAmbas && ex.presupuesto===true;
  return {...d, pctC, pctU, avg:(pctC+pctU)/2, cumpleAmbas, ganador};
}
function grupoMetrics(g){
  const rutas=USERS.filter(x=>x.rol==='Vend'&&x.g===g).map(x=>x.u);
  let mC=0,mU=0,cN=0,uV=0;
  rutas.forEach(r=>{ const d=D[cur]?D[cur][r]:null; if(!d) return; mC+=d.metaClientes; mU+=d.metaUnidades; cN+=d.clientesNuevos; uV+=d.unidadesVendidas; });
  const pctC = mC? cN/mC*100:0, pctU = mU? uV/mU*100:0;
  return { grupo:g, mC, mU, cN, uV, pctC, pctU, rutas: rutas.length };
}

  let h=`<div class="rulecard">
    <h3>🎯 ¿Cómo ganar el ${c.name}?</h3>
    <ul class="rulelist">
      <li><span class="num">1</span><span>Cumplir la meta de <b>clientes nuevos</b> y la meta de <b>unidades</b> de ${c.producto} en tu ruta.</span></li>
      <li><span class="num">2</span><span>Tener el cumplimiento de <b>presupuesto de lácteos por encima del 95%</b>.</span></li>
      <li><span class="num">3</span><span>Estar <b>vinculado laboralmente con Normandy</b> al momento de la verificación y el pago.</span></li>
    </ul>
  </div>
  <div class="rulecard">
    <h3>📅 Fechas importantes</h3>
    <ul class="rulelist">
      <li><span class="num">1</span><span><b>${startFmt} al ${endFmt}</b>: periodo de medición. Se mide el cumplimiento de meta de clientes y de unidades.</span></li>
      <li><span class="num">2</span><span><b>1 al 5 de agosto</b>: verificación de ganadores.</span></li>
      <li><span class="num">3</span><span><b>Primera quincena de agosto</b>: pago de la bonificación a quienes cumplan las condiciones.</span></li>
    </ul>
  </div>
  <div class="prizebox">
    <div class="amt">$${c.premio.toLocaleString('es-CO')}</div>
    <div class="lbl">Para cada vendedor que cumpla las 3 condiciones</div>
  </div>`;
  el.innerHTML=h;
}

/* ─────────── ADMIN ─────────── */
function renderAdmin(){
  const el=document.getElementById('TA');
  const c=curCampaign();
  let h=`<div class="adminbox"><h4>⚙️ Panel del Administrador · ${c.icon} ${c.name}</h4>`;
  h+='<button class="abtn" onclick="loadCampaignData(cur)">🔄 Recargar datos del Sheets</button>';
  h+='<button class="abtn sec" onclick="downloadUpdatedHTML()">⬇️ Descargar HTML con cambios</button>';
  h+='<div style="font-size:11.5px;color:var(--ink2);margin-top:8px">Los cambios de contraseñas y condiciones adicionales se pierden al cerrar la página si no descargas y vuelves a subir el HTML a GitHub. Las contraseñas y este archivo aplican a <b>todas</b> las campañas.</div>';
  h+='</div>';

  h+=`<div class="adminbox"><h4>📋 Condiciones adicionales por ruta · ${c.producto} (presupuesto de lácteos)</h4>`;
  USERS.filter(x=>x.rol==='Vend').forEach(x=>{
    const ex=getExtra(cur, x.u);
    h+=`<div class="arow"><div class="who">${x.u}</div>
      <select onchange="getExtra(cur,'${x.u}').presupuesto=this.value===''?null:this.value==='si'">
        <option value="" ${ex.presupuesto===null?'selected':''}>Presupuesto: Pendiente</option>
        <option value="si" ${ex.presupuesto===true?'selected':''}>Presupuesto ≥95%: Sí</option>
        <option value="no" ${ex.presupuesto===false?'selected':''}>Presupuesto ≥95%: No</option>
      </select></div>`;
  });
  h+='</div>';

  h+='<div class="adminbox"><h4>🔑 Gestión de contraseñas (aplica a todas las campañas)</h4>';
  USERS.forEach((x,i)=>{
    h+=`<div class="arow"><div class="who">${x.rol} · ${x.u}</div>
      <input type="text" id="pw_${i}" placeholder="Nueva contraseña" style="flex:1;min-width:140px">
      <button class="abtn ok" style="margin:0" onclick="changePwd(${i})">Guardar</button></div>`;
  });
  h+='</div>';
  el.innerHTML=h;
}
function changePwd(i){
  const v=document.getElementById('pw_'+i).value.trim();
  if(!v){ alert('Escribe una contraseña.'); return; }
  USERS[i].p=v;
  document.getElementById('pw_'+i).value='';
  document.getElementById('pw_'+i).placeholder='✓ Actualizada (recuerda descargar el HTML)';
}
function downloadUpdatedHTML(){
  if(!ORIGINAL_HTML){ alert('No se pudo cargar el archivo original todavía. Intenta de nuevo en unos segundos.'); return; }
  let out=ORIGINAL_HTML;
  out=out.replace(/const USERS=\[[\s\S]*?\];/, 'const USERS='+JSON.stringify(USERS)+';');
  out=out.replace(/const EXTRA=[\s\S]*?;/, 'const EXTRA='+JSON.stringify(EXTRA)+';');
  const blob=new Blob([out], {type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='index.html'; a.click();
  URL.revokeObjectURL(url);
}
</script>
